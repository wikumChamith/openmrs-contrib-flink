connection:
  jdbc: "jdbc:mysql://localhost:3306/openmrs"
  username: "openmrs"
  password: "openmrs"

sourceTable: "encounter"

lookupTables:
  - "obs"

sink:
  jdbc: "jdbc:mysql://localhost:3306/flattened"
  username: "openmrs"
  password: "openmrs"
  table: "vitals"
  primaryKey:
    - "encounter_id"
  columns:
    - name: "encounter_id"
      type: "INT"
    - name: "patient_id"
      type: "INT"
    - name: "encounter_datetime"
      type: "TIMESTAMP(3)"
    - name: "systolic_bp"
      type: "DOUBLE"
    - name: "diastolic_bp"
      type: "DOUBLE"
    - name: "temperature_c"
      type: "DOUBLE"
    - name: "height_cm"
      type: "DOUBLE"
    - name: "weight_kg"
      type: "DOUBLE"
    - name: "pulse"
      type: "DOUBLE"
    - name: "respiratory_rate"
      type: "DOUBLE"
    - name: "oxygen_saturation"
      type: "DOUBLE"
    - name: "location_id"
      type: "INT"
    - name: "visit_id"
      type: "INT"
    - name: "creator"
      type: "INT"
    - name: "date_created"
      type: "TIMESTAMP(3)"
    - name: "voided"
      type: "BOOLEAN"
    - name: "uuid"
      type: "STRING"

fieldMappings:
  passthroughFields:
    - "encounter_id"
    - "patient_id"
    - "encounter_datetime"
    - "location_id"
    - "visit_id"
    - "creator"
    - "date_created"
    - "voided"
    - "uuid"

  conceptMappings:
    - column: "systolic_bp"
      conceptId: 2100
      valueType: "value_numeric"

    - column: "diastolic_bp"
      conceptId: 2101
      valueType: "value_numeric"

    - column: "temperature_c"
      conceptId: 2102
      valueType: "value_numeric"

    - column: "height_cm"
      conceptId: 2103
      valueType: "value_numeric"

    - column: "weight_kg"
      conceptId: 2104
      valueType: "value_numeric"

    - column: "pulse"
      conceptId: 2105
      valueType: "value_numeric"

    - column: "respiratory_rate"
      conceptId: 2107
      valueType: "value_numeric"

    - column: "oxygen_saturation"
      conceptId: 2109
      valueType: "value_numeric"

  filters:
    - "encounter_type = 5"
    - "voided = false"
