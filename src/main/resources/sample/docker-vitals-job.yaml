connection:
  jdbc: "jdbc:mysql://localhost:3306/openmrs"
  username: "openmrs"
  password: "openmrs"

sourceTable: "encounter"

# Lookup table to join obs data
lookupTables:
  - "obs"

sink:
  jdbc: "jdbc:mysql://localhost:3306/flattened"
  username: "openmrs"
  password: "openmrs"
  table: "vitals"
  primaryKey:
    - "encounter_id"
  columns:
    - name: "encounter_id"
      type: "INT"
    - name: "patient_id"
      type: "INT"
    - name: "encounter_datetime"
      type: "TIMESTAMP(3)"
    - name: "systolic_bp"
      type: "DOUBLE"
    - name: "diastolic_bp"
      type: "DOUBLE"
    - name: "temperature_c"
      type: "DOUBLE"
    - name: "height_cm"
      type: "DOUBLE"
    - name: "weight_kg"
      type: "DOUBLE"
    - name: "pulse"
      type: "DOUBLE"
    - name: "respiratory_rate"
      type: "DOUBLE"
    - name: "oxygen_saturation"
      type: "DOUBLE"
    - name: "location_id"
      type: "INT"
    - name: "visit_id"
      type: "INT"
    - name: "creator"
      type: "INT"
    - name: "date_created"
      type: "TIMESTAMP(3)"
    - name: "voided"
      type: "BOOLEAN"
    - name: "uuid"
      type: "STRING"

# Pivot transformation: Convert EAV obs rows into columns
# Filters for encounter_type = 5 (vitals encounters)
sql: |
  SELECT
    e.encounter_id,
    e.patient_id,
    e.encounter_datetime,
    MAX(CASE WHEN o.concept_id = 2100 THEN o.value_numeric END) as systolic_bp,
    MAX(CASE WHEN o.concept_id = 2101 THEN o.value_numeric END) as diastolic_bp,
    MAX(CASE WHEN o.concept_id = 2102 THEN o.value_numeric END) as temperature_c,
    MAX(CASE WHEN o.concept_id = 2103 THEN o.value_numeric END) as height_cm,
    MAX(CASE WHEN o.concept_id = 2104 THEN o.value_numeric END) as weight_kg,
    MAX(CASE WHEN o.concept_id = 2105 THEN o.value_numeric END) as pulse,
    MAX(CASE WHEN o.concept_id = 2107 THEN o.value_numeric END) as respiratory_rate,
    MAX(CASE WHEN o.concept_id = 2109 THEN o.value_numeric END) as oxygen_saturation,
    e.location_id,
    e.visit_id,
    e.creator,
    e.date_created,
    e.voided,
    e.uuid
  FROM encounter_source e
  LEFT JOIN lkp_obs o
    ON e.encounter_id = o.encounter_id
    AND o.voided = false
  WHERE e.encounter_type = 5
    AND e.voided = false
  GROUP BY
    e.encounter_id,
    e.patient_id,
    e.encounter_datetime,
    e.location_id,
    e.visit_id,
    e.creator,
    e.date_created,
    e.voided,
    e.uuid