connection:
  jdbc: "jdbc:mysql://db:3306/openmrs"
  username: "${{ secrets.SOURCE_DB_USERNAME }}"
  password: "${{ secrets.SOURCE_DB_PASSWORD }}"

sourceTable: "encounter"

lookupTables:
  - "obs"

sink:
  jdbc: "jdbc:mysql://db:3306/flattened"
  username: "${{ secrets.SINK_DB_USERNAME }}"
  password: "${{ secrets.SINK_DB_PASSWORD }}"
  table: "vitals"
  primaryKey:
    - "encounter_id"
  columns:
    - name: "encounter_id"
      type: "INT"
    - name: "patient_id"
      type: "INT"
    - name: "encounter_datetime"
      type: "TIMESTAMP(3)"
    - name: "systolic_bp"
      type: "DOUBLE"
    - name: "diastolic_bp"
      type: "DOUBLE"
    - name: "temperature_c"
      type: "DOUBLE"

fieldMappings:
  passthroughFields:
    - "encounter_id"
    - "patient_id"
    - "encounter_datetime"

  conceptMappings:
    - column: "systolic_bp"
      conceptId: 2100
      valueType: "value_numeric"

    - column: "diastolic_bp"
      conceptId: 2101
      valueType: "value_numeric"

    - column: "temperature_c"
      conceptId: 2102
      valueType: "value_numeric"

  filters:
    - "encounter_type = 5"
    - "voided = false"