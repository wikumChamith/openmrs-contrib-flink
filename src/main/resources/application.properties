spring.application.name=openmrs-contrib-flink

# Server Configuration
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/openmrs_flink
spring.datasource.username=flink_user
spring.datasource.password=flink_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Secrets encryption key (base64-encoded 256-bit AES key)
# IMPORTANT: Override this in production via environment variable SECRETS_ENCRYPTION_KEY
secrets.encryption-key=${SECRETS_ENCRYPTION_KEY:HdF3lssbjZz2Is7KXLs9mx9O6l+iW/tOFEaPF/4AGBI=}

# JWT Configuration
# IMPORTANT: Override this in production via environment variable JWT_SECRET
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNhbXBsZSBzZWNyZXQga2V5IGZvciBqd3Q=}
jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Default admin credentials (only used on first startup when no users exist)
admin.default-username=${ADMIN_USERNAME:admin}
admin.default-password=${ADMIN_PASSWORD:admin123}

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
