<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMRS Flink CDC - Job Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-section {
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-section:hover {
            border-color: #667eea;
            background: #f7fafc;
        }

        .upload-section.dragover {
            border-color: #667eea;
            background: #edf2f7;
        }

        .upload-icon {
            font-size: 48px;
            color: #cbd5e0;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .file-info {
            color: #718096;
            font-size: 14px;
            margin-top: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }

        .btn-secondary:hover {
            background: #cbd5e0;
        }

        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .alert-info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .jobs-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .section-title {
            color: #2d3748;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .job-list {
            list-style: none;
        }

        .job-item {
            background: #f7fafc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-info {
            flex: 1;
        }

        .job-name {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .job-details {
            font-size: 12px;
            color: #718096;
        }

        .job-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-running {
            background: #c6f6d5;
            color: #22543d;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #a0aec0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>OpenMRS Flink CDC</h1>
        <p class="subtitle">Upload YAML configuration to create ETL jobs</p>

        <div id="alert" class="alert"></div>

        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📄</div>
            <div class="upload-text">Click to browse or drag and drop your YAML file</div>
            <div class="file-info">Supports .yaml and .yml files</div>
            <div id="selectedFile" class="file-info" style="color: #667eea; font-weight: 600;"></div>
        </div>

        <input type="file" id="fileInput" accept=".yaml,.yml">

        <div class="spinner" id="spinner"></div>

        <button class="btn btn-primary" id="uploadBtn" disabled>Upload Job Configuration</button>
        <button class="btn btn-secondary" id="refreshBtn">Refresh Jobs List</button>

        <div class="jobs-section">
            <div class="section-title">Active Jobs</div>
            <ul class="job-list" id="jobList">
                <li style="color: #a0aec0; text-align: center; padding: 20px;">No jobs found. Upload a YAML file to create one.</li>
            </ul>
        </div>

        <div class="footer">
            OpenMRS Flink CDC ETL Pipeline Manager
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const selectedFileDiv = document.getElementById('selectedFile');
        const alert = document.getElementById('alert');
        const spinner = document.getElementById('spinner');
        const jobList = document.getElementById('jobList');

        let selectedFile = null;

        // Click to upload
        uploadSection.addEventListener('click', () => fileInput.click());

        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        function handleFileSelect(file) {
            if (file && (file.name.endsWith('.yaml') || file.name.endsWith('.yml'))) {
                selectedFile = file;
                selectedFileDiv.textContent = `Selected: ${file.name}`;
                uploadBtn.disabled = false;
                hideAlert();
            } else {
                showAlert('Please select a valid YAML file (.yaml or .yml)', 'error');
                selectedFile = null;
                selectedFileDiv.textContent = '';
                uploadBtn.disabled = true;
            }
        }

        // Upload button
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            uploadBtn.disabled = true;
            spinner.style.display = 'block';
            hideAlert();

            try {
                const response = await fetch('/api/jobs/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('Job created successfully!', 'success');
                    selectedFile = null;
                    selectedFileDiv.textContent = '';
                    fileInput.value = '';
                    loadJobs();
                } else {
                    showAlert(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showAlert('Failed to upload file. Please check if the server is running.', 'error');
            } finally {
                spinner.style.display = 'none';
                uploadBtn.disabled = false;
            }
        });

        // Refresh button
        refreshBtn.addEventListener('click', loadJobs);

        // Load jobs list
        async function loadJobs() {
            try {
                const response = await fetch('/api/jobs');
                const jobs = await response.json();

                if (jobs && jobs.length > 0) {
                    jobList.innerHTML = jobs.map(job => `
                        <li class="job-item">
                            <div class="job-info">
                                <div class="job-name">${job.sink?.sinkTable || 'Unknown'}</div>
                                <div class="job-details">
                                    Source: ${job.source?.sourceTable || 'N/A'} →
                                    Sink: ${job.sink?.sinkJdbc?.match(/\/\/([^\/]+)/)?.[1] || 'N/A'}
                                </div>
                            </div>
                            <div class="job-status status-running">Running</div>
                        </li>
                    `).join('');
                } else {
                    jobList.innerHTML = '<li style="color: #a0aec0; text-align: center; padding: 20px;">No jobs found. Upload a YAML file to create one.</li>';
                }
            } catch (error) {
                console.error('Failed to load jobs:', error);
            }
        }

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function hideAlert() {
            alert.style.display = 'none';
        }

        // Load jobs on page load
        loadJobs();
    </script>
</body>
</html>
