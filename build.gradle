plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.6'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'openmrs-contrib-flink'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Apache Flink
    implementation 'org.apache.flink:flink-streaming-java:1.19.0'
    implementation 'org.apache.flink:flink-table-api-java-bridge:1.19.0'
    implementation 'org.apache.flink:flink-table-planner_2.12:1.19.0'
    implementation 'org.apache.flink:flink-clients:1.19.0'
    implementation 'org.apache.flink:flink-connector-base:1.19.0'
    implementation 'org.apache.flink:flink-runtime:1.19.0'

    // Flink CDC Connectors
    implementation 'com.ververica:flink-sql-connector-mysql-cdc:3.0.1'

    // Jackson JAXB module (required by shaded CDC connector's ServiceLoader registration)
    implementation 'com.fasterxml.jackson.module:jackson-module-jaxb-annotations'

    // Flink JDBC Connector
    implementation 'org.apache.flink:flink-connector-jdbc:3.2.0-1.19'

    // Database Drivers
    runtimeOnly 'org.mariadb.jdbc:mariadb-java-client'
    runtimeOnly 'com.mysql:mysql-connector-j:9.3.0'

    // YAML Parser
    implementation 'org.yaml:snakeyaml:2.2'

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

jar {
    enabled = false
}

tasks.named('test') {
    useJUnitPlatform()
}
